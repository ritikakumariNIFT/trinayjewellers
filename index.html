<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain For Sale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <header class="min-h-[60vh] flex flex-col items-center justify-center text-center px-6 bg-white border-b border-gray-200">
        <span class="px-4 py-1.5 rounded-full bg-blue-100 text-blue-700 text-sm font-semibold mb-6">
            Premium Domain Available
        </span>
        <h1 class="text-5xl md:text-7xl font-800 tracking-tight text-gray-900 mb-4">
            yourdomain.com
        </h1>
        <p class="text-lg text-gray-600 max-w-2xl">
            This premium digital asset is currently available for acquisition. 
            Secure this brand-ready domain today to elevate your online presence.
        </p>
    </header>

    <section class="py-16 px-6 max-w-xl mx-auto">
        <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
            <h2 class="text-2xl font-bold mb-6 text-center">Make an Offer</h2>
            
            <form action="https://formspree.io/f/your-id" method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Your Name</label>
                    <input type="text" name="name" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" name="email" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Your Offer ($)</label>
                    <input type="number" name="offer" placeholder="Enter amount" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Message (Optional)</label>
                    <textarea name="message" rows="3" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg transition-all shadow-lg shadow-blue-200">
                    Send Inquiry
                </button>
            </form>
        </div>
    </section>

    <footer class="py-10 text-center text-gray-400 text-sm">
        <p>© 2026 yourdomain.com. All rights reserved.</p>
    </footer>

</body>
</html>
